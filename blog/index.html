<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Sants Company</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="blog">
  <div class="global-header"></div>

  <main>
    <section class="blog-section">
      <div class="container">
        <h1 class="blog-title">Blog da Sants Company</h1>
        <p class="blog-intro">Conteúdos sobre presença digital, desenvolvimento web, marketing e estruturação de canais para pequenas e médias empresas.</p>
        <div id="blogList" class="blog-list"></div>
      </div>
    </section>
  </main>

  <div class="global-footer"></div>

  <script src="../assets/js/components.js"></script>
  <script src="../js/script.js"></script>
  <script>
    fetch("posts.json")
      .then((response) => response.json())
      .then((posts) => {
        const blogList = document.getElementById("blogList");
        if (!blogList || !posts.length) return;

        const [featuredPost, ...secondaryPosts] = posts;

        blogList.innerHTML = `
          <a href="./post.html?id=${featuredPost.id}" class="blog-featured-card">
            <img src="${featuredPost.banner}" alt="${featuredPost.title}" class="blog-featured-img" loading="lazy">
            <div class="blog-featured-content">
              <div class="blog-meta">${featuredPost.date} • ${featuredPost.category} • ${featuredPost.readingTime}</div>
              <h2>${featuredPost.title}</h2>
              <p>${featuredPost.summary}</p>
              <span class="blog-card-readmore">Ler post completo</span>
            </div>
          </a>
          <div class="blog-cards">
            ${secondaryPosts.map((post) => `
              <a href="./post.html?id=${post.id}" class="blog-card">
                <img src="${post.banner}" alt="${post.title}" class="blog-card-img" loading="lazy">
                <div class="blog-card-content">
                  <div class="blog-card-meta">${post.date} • ${post.category}</div>
                  <div class="blog-card-title">${post.title}</div>
                  <div class="blog-card-excerpt">${post.summary}</div>
                  <span class="blog-card-readmore">Ler mais</span>
                </div>
              </a>
            `).join("")}
          </div>
        `;
      })
      .catch((error) => {
        console.error(error);
      });
  </script>
</body>
</html>
